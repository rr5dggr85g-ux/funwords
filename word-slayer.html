<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>单词杀手 Word Slayer</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  display: flex; align-items: center; justify-content: center;
}
#app {
  width: 100%; max-width: 480px; height: 100vh; height: 100dvh;
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, #0d0d2b 0%, #1a0a2e 50%, #0d0d2b 100%);
}
.screen {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.3s, transform 0.3s; padding: 20px;
}
.screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

/* ===== Particles Canvas ===== */
#particles {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
}

/* ===== Menu Screen ===== */
#menu-screen { z-index: 10; }
.menu-title {
  font-size: 48px; font-weight: 900; letter-spacing: 2px;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px; text-align: center;
  text-shadow: none;
  position: relative;
}
.menu-subtitle { font-size: 16px; color: #888; margin-bottom: 40px; letter-spacing: 4px; text-align: center; }
.menu-section { width: 100%; max-width: 320px; margin-bottom: 24px; }
.menu-label { font-size: 13px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
.menu-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.menu-cards.col3 { grid-template-columns: 1fr 1fr 1fr; }
.menu-card {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 14px 10px; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.menu-card:active { transform: scale(0.95); }
.menu-card.selected { border-color: #ffd93d; background: rgba(255,217,61,0.1); box-shadow: 0 0 20px rgba(255,217,61,0.15); }
.menu-card-icon { font-size: 28px; margin-bottom: 4px; }
.menu-card-title { font-size: 14px; font-weight: 700; }
.menu-card-desc { font-size: 11px; color: #888; margin-top: 2px; }

.btn-start {
  width: 100%; max-width: 320px; padding: 16px; border: none; border-radius: 16px;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 2px;
  cursor: pointer; transition: all 0.2s; margin-top: 16px;
  box-shadow: 0 4px 24px rgba(238,90,36,0.4);
}
.btn-start:active { transform: scale(0.96); opacity: 0.9; }

.btn-clear-wrong {
  background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3);
  color: #ff6b6b; font-size: 11px; padding: 6px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.btn-clear-wrong:active { background: rgba(255,107,107,0.3); }

.stats-row { display: flex; gap: 16px; margin-top: 20px; font-size: 12px; color: #666; }
.stats-row span { text-align: center; }

/* ===== Game Screen ===== */
#game-screen { z-index: 10; padding: 0; justify-content: flex-start; }

/* HUD */
.hud {
  width: 100%; padding: 12px 16px; display: flex; align-items: center;
  justify-content: space-between; z-index: 5;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
}
.hud-item { text-align: center; }
.hud-item .val { font-size: 22px; font-weight: 800; }
.hud-item .lbl { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.hp-hearts { display: flex; gap: 3px; }
.hp-hearts .heart { font-size: 20px; transition: all 0.3s; }
.hp-hearts .heart.lost { opacity: 0.2; transform: scale(0.7); filter: grayscale(1); }

/* Combo pop */
.combo-pop {
  position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
  font-size: 28px; font-weight: 900; color: #ffd93d;
  opacity: 0; pointer-events: none; z-index: 20;
  text-shadow: 0 0 20px rgba(255,217,61,0.8);
  transition: none;
}
.combo-pop.show { animation: comboBurst 0.8s ease-out forwards; }
@keyframes comboBurst {
  0% { opacity: 1; transform: translateX(-50%) scale(0.5); }
  30% { opacity: 1; transform: translateX(-50%) scale(1.3); }
  100% { opacity: 0; transform: translateX(-50%) scale(1) translateY(-30px); }
}

/* Enemy area */
.enemy-area {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; z-index: 5; padding: 20px;
}
.enemy-sprite {
  font-size: 80px; transition: transform 0.15s; position: relative;
}
.enemy-sprite.hit { animation: enemyHit 0.4s ease-out; }
@keyframes enemyHit {
  0% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}
.enemy-name { font-size: 12px; color: #ff6b6b; margin-top: 4px; letter-spacing: 1px; }
.enemy-hp-bar {
  width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;
  margin-top: 8px; overflow: hidden;
}
.enemy-hp-fill {
  height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffd93d);
  border-radius: 3px; transition: width 0.3s;
}

/* Word card */
.word-card {
  background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 16px 28px; text-align: center; margin-bottom: 8px;
  backdrop-filter: blur(10px);
}
.word-card .english { font-size: 36px; font-weight: 900; color: #fff; letter-spacing: 2px; }
.word-card .phonetic { font-size: 13px; color: #888; margin-top: 2px; }
.word-card .hint { font-size: 12px; color: #666; margin-top: 4px; }

/* Timer bar */
.timer-bar-wrap { width: 80%; max-width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.timer-bar { height: 100%; background: #4d96ff; border-radius: 2px; transition: width 0.1s linear; }
.timer-bar.danger { background: #ff6b6b; }

/* Options */
.options-area {
  width: 100%; padding: 0 16px 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  z-index: 5;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.opt-btn {
  padding: 16px 12px; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 14px; background: rgba(255,255,255,0.05);
  color: #e0e0e0; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; text-align: center; word-break: break-all;
  min-height: 52px; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(5px);
}
.opt-btn:active { transform: scale(0.95); }
.opt-btn.correct {
  border-color: #6bcb77; background: rgba(107,203,119,0.2);
  animation: pulseGreen 0.4s;
}
.opt-btn.wrong {
  border-color: #ff6b6b; background: rgba(255,107,107,0.2);
  animation: shake 0.4s;
}
@keyframes pulseGreen {
  0%, 100% { box-shadow: 0 0 0 rgba(107,203,119,0); }
  50% { box-shadow: 0 0 30px rgba(107,203,119,0.5); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* ===== Screen Shake ===== */
.screen-shake { animation: screenShake 0.4s ease-out; }
@keyframes screenShake {
  0%, 100% { transform: translate(0); }
  10% { transform: translate(-4px, 2px); }
  30% { transform: translate(4px, -1px); }
  50% { transform: translate(-2px, -2px); }
  70% { transform: translate(3px, 1px); }
  90% { transform: translate(-1px, -1px); }
}

/* ===== Result overlay ===== */
.result-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.result-card {
  background: #1a1a3e; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 40px 28px; max-width: 360px; width: 90%;
  text-align: center;
}
.result-card h2 { font-size: 32px; margin-bottom: 8px; }
.result-card .big-num { font-size: 56px; font-weight: 900; color: #ffd93d; }
.result-card .stat-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  margin: 24px 0;
}
.result-card .stat-grid .stat-item .stat-val { font-size: 24px; font-weight: 800; }
.result-card .stat-grid .stat-item .stat-lbl { font-size: 11px; color: #888; }
.btn-row { display: flex; gap: 10px; }
.btn-row button {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.btn-retry { background: #4d96ff; color: #fff; }
.btn-home { background: rgba(255,255,255,0.1); color: #ccc; }
.btn-row button:active { transform: scale(0.95); }

/* Word review */
.word-review { max-height: 200px; overflow-y: auto; margin: 12px 0; text-align: left; font-size: 13px; }
.word-review .wr-item {
  display: flex; justify-content: space-between; padding: 6px 8px;
  border-radius: 6px; margin-bottom: 4px;
  background: rgba(255,255,255,0.03);
}
.word-review .wr-item.wrong-word { background: rgba(255,107,107,0.1); }
.word-review .wr-en { font-weight: 700; color: #ccc; }
.word-review .wr-zh { color: #888; }

/* Boss alert */
.boss-alert {
  position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
  font-size: 40px; font-weight: 900; color: #ff6b6b; z-index: 25;
  pointer-events: none; opacity: 0;
  text-shadow: 0 0 30px rgba(255,107,107,0.8);
}
.boss-alert.show { animation: bossIn 1.5s ease-out forwards; }
@keyframes bossIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
}

/* ===== Responsive ===== */
@media (max-width: 360px) {
  .menu-title { font-size: 36px; }
  .word-card .english { font-size: 28px; }
  .opt-btn { font-size: 14px; padding: 14px 8px; }
  .options-area { gap: 8px; padding: 0 12px 16px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <canvas id="particles"></canvas>

  <!-- Menu Screen -->
  <div id="menu-screen" class="screen">
    <div class="menu-title">单 词 杀 手</div>
    <div class="menu-subtitle">WORD SLAYER</div>

    <div class="menu-section">
      <div class="menu-label">🎯 游戏模式</div>
      <div class="menu-cards col3" id="mode-cards">
        <div class="menu-card selected" data-mode="en2zh">
          <div class="menu-card-icon">🔤</div>
          <div class="menu-card-title">看英选中</div>
          <div class="menu-card-desc">看英文，选中文</div>
        </div>
        <div class="menu-card" data-mode="zh2en">
          <div class="menu-card-icon">🀄</div>
          <div class="menu-card-title">看中选英</div>
          <div class="menu-card-desc">看中文，选英文</div>
        </div>
        <div class="menu-card" data-mode="review" id="review-card">
          <div class="menu-card-icon">📝</div>
          <div class="menu-card-title">错题复习</div>
          <div class="menu-card-desc">0 个待复习</div>
        </div>
      </div>
    </div>

    <div class="menu-section" id="diff-section">
      <div class="menu-label">📚 词库难度</div>
      <div class="menu-cards col3" id="diff-cards">
        <div class="menu-card selected" data-diff="easy">
          <div class="menu-card-icon">🌱</div>
          <div class="menu-card-title">初一上</div>
          <div class="menu-card-desc">基础词汇</div>
        </div>
        <div class="menu-card" data-diff="medium">
          <div class="menu-card-icon">🌿</div>
          <div class="menu-card-title">初一下</div>
          <div class="menu-card-desc">进阶词汇</div>
        </div>
        <div class="menu-card" data-diff="hard">
          <div class="menu-card-icon">🌳</div>
          <div class="menu-card-title">初二上</div>
          <div class="menu-card-desc">预习词汇</div>
        </div>
      </div>
    </div>

    <button class="btn-start" id="btn-start" onclick="startGame()">
      ⚔️ 开始战斗
    </button>
    <div class="stats-row">
      <span>🏆 最高分: <b id="menu-best">0</b></span>
      <span>📝 已掌握: <b id="menu-mastered">0</b></span>
      <span>📝 错题本: <b id="menu-wrong-count">0</b></span>
    </div>
    <div class="stats-row" style="margin-top:4px;">
      <button class="btn-clear-wrong" id="btn-clear-wrong" onclick="clearWrongBookAndUpdate()">
        🗑 清空错题本
      </button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen hidden">
    <div class="combo-pop" id="combo-pop"></div>
    <div class="boss-alert" id="boss-alert">⚠️ BOSS ⚠️</div>
    <div class="hud">
      <div class="hp-hearts" id="hp-hearts"></div>
      <div class="hud-item">
        <div class="val" id="hud-score">0</div>
        <div class="lbl">分数</div>
      </div>
      <div class="hud-item">
        <div class="val" id="hud-combo">x1</div>
        <div class="lbl">连击</div>
      </div>
      <div class="hud-item">
        <div class="val" id="hud-wave">1</div>
        <div class="lbl">关卡</div>
      </div>
    </div>
    <div class="enemy-area">
      <div class="enemy-sprite" id="enemy-sprite">👾</div>
      <div class="enemy-name" id="enemy-name">小单词怪</div>
      <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp-fill" style="width:100%"></div></div>
      <div class="word-card" style="margin-top:20px;">
        <div class="english" id="word-display">apple</div>
        <div class="phonetic" id="phonetic-display"></div>
        <div class="hint" id="word-hint"></div>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    </div>
    <div class="options-area" id="options-area"></div>
  </div>
</div>

// ==================== AUDIO ENGINE ====================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBeep(freq, duration, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function sfxCorrect() { playBeep(880, 0.08, 'square'); setTimeout(() => playBeep(1100, 0.1, 'square'), 80); }
function sfxWrong() { playBeep(150, 0.2, 'sawtooth', 0.06); }
function sfxCombo() { playBeep(660, 0.06, 'square'); setTimeout(() => playBeep(880, 0.06, 'square'), 60); setTimeout(() => playBeep(1100, 0.08, 'square'), 120); }
function sfxBoss() { playBeep(200, 0.3, 'sawtooth', 0.08); setTimeout(() => playBeep(250, 0.3, 'sawtooth', 0.08), 200); setTimeout(() => playBeep(300, 0.4, 'sawtooth', 0.08), 400); }
function sfxHit() { playBeep(120, 0.15, 'triangle', 0.06); }
function sfxGameOver() { playBeep(400, 0.2); setTimeout(() => playBeep(300, 0.2), 200); setTimeout(() => playBeep(200, 0.4), 400); }

// ==================== SPEECH ====================
function speakWord(en) {
  if (!window.speechSynthesis) return;
  // Cancel any ongoing speech
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(en);
  utterance.lang = 'en-US';
  utterance.rate = 0.85;    // slightly slower for learners
  utterance.pitch = 1.0;
  utterance.volume = 0.8;
  // Try to pick a good English voice
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en-US'))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  if (enVoice) utterance.voice = enVoice;
  window.speechSynthesis.speak(utterance);
}

// ==================== PARTICLES ====================
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let ambientParticles = [];

function resizeCanvas() {
  const app = document.getElementById('app');
  canvas.width = app.offsetWidth;
  canvas.height = app.offsetHeight;
  initAmbientParticles();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function initAmbientParticles() {
  ambientParticles = [];
  const count = Math.floor((canvas.width * canvas.height) / 8000);
  for (let i = 0; i < count; i++) {
    ambientParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      opacity: Math.random() * 0.4 + 0.1,
    });
  }
}
initAmbientParticles();

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1,
      decay: 0.02 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color,
    });
  }
}

function updateParticles() {
  // Update event particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vy += 0.05; // gravity
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Update ambient particles
  for (const p of ambientParticles) {
    p.y -= p.speed;
    if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw ambient particles
  for (const p of ambientParticles) {
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  // Draw event particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function particleLoop() {
  updateParticles();
  drawParticles();
  requestAnimationFrame(particleLoop);
}
particleLoop();

// ==================== HELPERS ====================
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWordPool() {
  if (state.mode === 'review') {
    return getWrongBookWords();
  }
  return WORD_DATA[state.difficulty] || WORD_DATA.easy;
}

function pickWord() {
  const pool = getWordPool();

  // Review mode: pick from wrong book
  if (state.mode === 'review') {
    if (pool.length === 0) return null; // no words to review
    const unused = pool.filter(w => !state.wordsUsed.has(w.en));
    if (unused.length === 0) {
      state.wordsUsed.clear();
      return pool[randInt(0, pool.length - 1)];
    }
    return unused[randInt(0, unused.length - 1)];
  }

  // Normal mode: 30% chance to reinforce a wrong word
  if (state.reinforceQueue.length > 0 && Math.random() < 0.3) {
    const word = state.reinforceQueue.shift();
    if (!state.wordsUsed.has(word.en)) {
      state.wordsUsed.add(word.en);
      return word;
    } else {
      // Already used this round, put back at end
      state.reinforceQueue.push(word);
    }
  }

  const unused = pool.filter(w => !state.wordsUsed.has(w.en));
  if (unused.length < 4) {
    state.wordsUsed.clear();
    return pickWord();
  }
  return unused[randInt(0, unused.length - 1)];
}

function generateOptions(correctWord) {
  const pool = getWordPool();
  let wrongs = pool.filter(w => w.en !== correctWord.en);

  // For review mode with small pool, pull distractors from all word banks
  if (wrongs.length < 3) {
    const allWords = [...WORD_DATA.easy, ...WORD_DATA.medium, ...WORD_DATA.hard];
    const extraWrongs = allWords.filter(w => w.en !== correctWord.en && !wrongs.find(pw => pw.en === w.en));
    wrongs = [...wrongs, ...shuffle(extraWrongs).slice(0, 3 - wrongs.length)];
  }

  const shuffledWrongs = shuffle(wrongs).slice(0, 3);
  const options = shuffle([correctWord, ...shuffledWrongs]);
  return options;
}

  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-combo').textContent = 'x' + state.combo;
  document.getElementById('hud-wave').textContent = state.wave;
  renderHearts();
}

function showComboPop(text) {
  const el = document.getElementById('combo-pop');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function showBossAlert() {
  const el = document.getElementById('boss-alert');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function screenShake() {
  const app = document.getElementById('app');
  app.classList.remove('screen-shake');
  void app.offsetWidth;
  app.classList.add('screen-shake');
}

// ==================== ENEMY SYSTEM ====================
const ENEMIES = {
  normal: [
    { sprite: '👾', name: '小单词怪' },
    { sprite: '👻', name: '拼写幽灵' },
    { sprite: '🐍', name: '字母蛇' },
    { sprite: '🦇', name: '语法蝙蝠' },
    { sprite: '🐺', name: '单词狼' },
  ],
  boss: [
    { sprite: '🐉', name: '单词巨龙' },
    { sprite: '👹', name: '词霸魔王' },
    { sprite: '🦖', name: '霸王龙' },
  ]
};

function setEnemy(isBoss) {
  const pool = isBoss ? ENEMIES.boss : ENEMIES.normal;
  const enemy = pool[randInt(0, pool.length - 1)];
  document.getElementById('enemy-sprite').textContent = enemy.sprite;
  document.getElementById('enemy-name').textContent = enemy.name;

  if (isBoss) {
    state.enemyMaxHp = 3 + Math.floor(state.wave / 5);
    state.enemyHp = state.enemyMaxHp;
    document.getElementById('enemy-sprite').style.fontSize = '100px';
  } else {
    state.enemyMaxHp = 1;
    state.enemyHp = 1;
    document.getElementById('enemy-sprite').style.fontSize = '80px';
  }
  document.getElementById('enemy-hp-fill').style.width = '100%';
}

function damageEnemy() {
  state.enemyHp--;
  const pct = (state.enemyHp / state.enemyMaxHp) * 100;
  document.getElementById('enemy-hp-fill').style.width = pct + '%';

  // Hit animation
  const sprite = document.getElementById('enemy-sprite');
  sprite.classList.remove('hit');
  void sprite.offsetWidth;
  sprite.classList.add('hit');

  // Spawn particles at enemy
  const rect = sprite.getBoundingClientRect();
  const appRect = document.getElementById('app').getBoundingClientRect();
  spawnParticles(
    rect.left - appRect.left + rect.width / 2,
    rect.top - appRect.top + rect.height / 2,
    15, '#ffd93d'
  );
}

// ==================== GAME LOGIC ====================
function showQuestion() {
  const word = pickWord();
  if (!word) {
    // No words to review
    endGame();
    return;
  }
  state.currentWord = word;
  state.wordsUsed.add(word.en);
  state.answered = false;

  const options = generateOptions(word);
  state.currentOptions = options;

  // Display word based on mode
  if (state.mode === 'en2zh' || state.mode === 'review') {
    document.getElementById('word-display').textContent = word.en;
    const reviewInfo = state.mode === 'review' && word.wrong ? `⚠️ 曾答错 ${word.wrong} 次` : '';
    document.getElementById('word-hint').textContent = reviewInfo || (word.hint ? `💡 ${word.hint}` : '');
    document.getElementById('phonetic-display').textContent = '';
    // Read the English word aloud
    speakWord(word.en);
  } else {
    document.getElementById('word-display').textContent = word.zh;
    document.getElementById('word-hint').textContent = word.hint ? `💡 ${word.hint}` : '';
    document.getElementById('phonetic-display').textContent = word.en.length > 0 ? `(${word.en.length} 个字母)` : '';
  }

  // Render option buttons
  const optsArea = document.getElementById('options-area');
  optsArea.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = (state.mode === 'en2zh' || state.mode === 'review') ? opt.zh : opt.en;
    btn.addEventListener('click', () => onAnswer(opt, i, btn));
    optsArea.appendChild(btn);
  });

  // Start timer (skip for review mode — no rush)
  if (state.mode === 'review') {
    document.getElementById('timer-bar').style.width = '100%';
    document.getElementById('timer-bar').classList.remove('danger');
    clearInterval(state.timerInterval);
  } else {
    state.timeLeft = state.maxTime;
    document.getElementById('timer-bar').style.width = '100%';
    document.getElementById('timer-bar').classList.remove('danger');

    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
      state.timeLeft -= 0.1;
      const pct = (state.timeLeft / state.maxTime) * 100;
      const timerBar = document.getElementById('timer-bar');
      timerBar.style.width = Math.max(0, pct) + '%';
      if (state.timeLeft < 2) timerBar.classList.add('danger');

      if (state.timeLeft <= 0 && !state.answered) {
        onTimeout();
      }
    }, 100);
  }
}

function onAnswer(selected, index, btnElement) {
  if (state.answered || state.gameOver) return;
  state.answered = true;
  clearInterval(state.timerInterval);
  initAudio();

  const correct = state.currentWord;
  const isCorrect = selected.en === correct.en;

  // Highlight correct answer
  const buttons = document.querySelectorAll('#options-area .opt-btn');
  buttons.forEach(b => {
    const optText = b.textContent;
    const correctText = state.mode === 'en2zh' ? correct.zh : correct.en;
    if (optText === correctText) b.classList.add('correct');
  });

  // Calc time bonus
  const timeBonus = Math.floor(state.timeLeft * 10);

  if (isCorrect) {
    btnElement.classList.add('correct');
    state.correctCount++;
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    // Wrong book: mark progress (review mode)
    if (state.mode === 'review') {
      markCorrectInWrongBook(correct.en);
    }

    // Remove from reinforce queue
    state.reinforceQueue = state.reinforceQueue.filter(w => w.en !== correct.en);

    // Score: base 100 + time bonus + combo multiplier
    const comboMult = Math.min(state.combo, 10);
    const points = (100 + timeBonus) * comboMult;
    state.score += points;

    sfxCorrect();

    // Combo milestones
    if (state.combo === 5) { showComboPop('🔥 5连击!'); sfxCombo(); }
    if (state.combo === 10) { showComboPop('⚡ 10连击!'); sfxCombo(); }
    if (state.combo === 20) { showComboPop('💥 20连击!!'); sfxCombo(); }
    if (state.combo % 10 === 0 && state.combo > 0) { showComboPop(`✨ ${state.combo}连击!`); }

    damageEnemy();

    // Check if enemy is dead
    if (state.enemyHp <= 0) {
      onEnemyDefeated();
    } else {
      // Next question after short delay
      setTimeout(() => showQuestion(), 600);
    }
  } else {
    btnElement.classList.add('wrong');
    state.combo = 0;
    state.wrongCount++;
    state.hp--;
    state.wrongWords.push({ en: correct.en, zh: correct.zh });

    // Save to persistent wrong book
    addToWrongBook(correct.en, correct.zh);

    // Add to reinforce queue (re-test later this session)
    if (!state.reinforceQueue.find(w => w.en === correct.en)) {
      state.reinforceQueue.push(correct);
    }

    sfxWrong(); sfxHit();
    screenShake();

    // Spawn red particles
    const rect = btnElement.getBoundingClientRect();
    const appRect = document.getElementById('app').getBoundingClientRect();
    spawnParticles(rect.left - appRect.left + rect.width / 2, rect.top - appRect.top + rect.height / 2, 8, '#ff6b6b');

    if (state.hp <= 0) {
      setTimeout(() => endGame(), 500);
    } else {
      setTimeout(() => showQuestion(), 800);
    }
  }

  renderHUD();
}

function onTimeout() {
  if (state.answered || state.gameOver) return;
  state.answered = true;
  clearInterval(state.timerInterval);
  initAudio();

  state.combo = 0;
  state.wrongCount++;
  state.hp--;
  state.wrongWords.push({ en: state.currentWord.en, zh: state.currentWord.zh });

  // Save to persistent wrong book
  addToWrongBook(state.currentWord.en, state.currentWord.zh);

  // Add to reinforce queue
  if (!state.reinforceQueue.find(w => w.en === state.currentWord.en)) {
    state.reinforceQueue.push(state.currentWord);
  }

  // Highlight correct answer
  const buttons = document.querySelectorAll('#options-area .opt-btn');
  buttons.forEach(b => {
    const correctText = state.mode === 'en2zh' ? state.currentWord.zh : state.currentWord.en;
    if (b.textContent === correctText) b.classList.add('correct');
  });

  sfxWrong(); sfxHit();
  screenShake();

  if (state.hp <= 0) {
    setTimeout(() => endGame(), 500);
  } else {
    setTimeout(() => showQuestion(), 800);
  }

  renderHUD();
}

function onEnemyDefeated() {
  state.wave++;

  // Boss every 5 waves
  const isBoss = state.wave % 5 === 0;
  state.isBoss = isBoss;

  if (isBoss) {
    showBossAlert();
    sfxBoss();
    // Bigger particle burst
    const sprite = document.getElementById('enemy-sprite');
    const rect = sprite.getBoundingClientRect();
    const appRect = document.getElementById('app').getBoundingClientRect();
    spawnParticles(rect.left - appRect.left + rect.width / 2, rect.top - appRect.top + rect.height / 2, 30, '#ff6b6b');
  }

  setEnemy(isBoss);
  renderHUD();

  setTimeout(() => showQuestion(), isBoss ? 1200 : 400);
}

function startGame() {
  initAudio();
  clearInterval(state.timerInterval); // safety clear of any lingering timer

  // Reset state
  state.hp = state.maxHp;
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.wave = 1;
  state.correctCount = 0;
  state.wrongCount = 0;
  state.gameOver = false;
  state.wordsUsed.clear();
  state.wrongWords = [];
  state.reinforceQueue = [];
  state.answered = false;
  state.isBoss = false;
  state.enemyHp = 1;
  state.enemyMaxHp = 1;

  // Set timer based on mode and difficulty
  if (state.mode === 'review') {
    state.maxTime = 10; // more time for review mode
    // Check if there are words to review
    if (getWrongBookCount() === 0) {
      alert('🎉 错题本是空的！先去普通模式答错几个词吧。');
      return;
    }
  } else if (state.difficulty === 'easy') {
    state.maxTime = 8;
  } else if (state.difficulty === 'medium') {
    state.maxTime = 7;
  } else {
    state.maxTime = 6;
  }

  // Switch screens
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  // Init game
  setEnemy(false);
  renderHUD();
  showQuestion();

  // Attempt to resume audio context on iOS
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function endGame() {
  state.gameOver = true;
  clearInterval(state.timerInterval);
  sfxGameOver();

  // Save stats
  saveStats(state.score, state.correctCount, state.maxCombo);

  // Show result
  showResult();
}

function showResult() {
  const app = document.getElementById('app');

  // Build wrong words review HTML
  let reviewHtml = '';
  if (state.wrongWords.length > 0) {
    const uniqueWrong = [];
    const seen = new Set();
    for (const w of state.wrongWords) {
      if (!seen.has(w.en)) { uniqueWrong.push(w); seen.add(w.en); }
    }
    reviewHtml = '<div class="word-review">';
    reviewHtml += '<div style="font-size:12px;color:#888;margin-bottom:6px;">📝 需要复习的单词：</div>';
    uniqueWrong.forEach(w => {
      reviewHtml += `<div class="wr-item wrong-word"><span class="wr-en">${w.en}</span><span class="wr-zh">${w.zh}</span></div>`;
    });
    reviewHtml += '</div>';
  }

  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';
  overlay.innerHTML = `
    <div class="result-card">
      <h2>${state.hp <= 0 ? '💔 战斗结束' : '🎉 太棒了!'}</h2>
      <div class="big-num">${state.score}</div>
      <div style="color:#888;margin-bottom:8px;">总分</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-val">${state.correctCount}</div><div class="stat-lbl">答对</div></div>
        <div class="stat-item"><div class="stat-val">${state.wrongCount}</div><div class="stat-lbl">答错</div></div>
        <div class="stat-item"><div class="stat-val">x${state.maxCombo}</div><div class="stat-lbl">最高连击</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-val">${state.wave}</div><div class="stat-lbl">到达关卡</div></div>
        <div class="stat-item"><div class="stat-val">${Math.round(state.correctCount / Math.max(1, state.correctCount + state.wrongCount) * 100)}%</div><div class="stat-lbl">正确率</div></div>
        <div class="stat-item"><div class="stat-val">${state.hp > 0 ? '✅' : '❌'}</div><div class="stat-lbl">存活</div></div>
      </div>
      ${reviewHtml}
      <div class="btn-row">
        <button class="btn-retry" onclick="closeResult(); startGame();">🔄 再来一局</button>
        <button class="btn-home" onclick="closeResult(); goHome();">🏠 返回</button>
      </div>
    </div>
  `;
  overlay.id = 'result-overlay';
  app.appendChild(overlay);

  // Update menu stats
  updateMenuStats();
}

function closeResult() {
  const overlay = document.getElementById('result-overlay');
  if (overlay) overlay.remove();
}

function goHome() {
  clearInterval(state.timerInterval);
  state.gameOver = true;
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  updateMenuStats();
}

// ==================== PERSISTENCE ====================
function saveStats(score, correct, maxCombo) {
  try {
    const data = JSON.parse(localStorage.getItem('wordslayer_stats') || '{}');
    const key = `${state.difficulty}_${state.mode}`;
    if (!data[key] || score > data[key].bestScore) {
      data[key] = { bestScore: score, bestCombo: maxCombo, totalCorrect: (data[key]?.totalCorrect || 0) + correct };
    } else {
      data[key].totalCorrect = (data[key]?.totalCorrect || 0) + correct;
      if (maxCombo > (data[key]?.bestCombo || 0)) data[key].bestCombo = maxCombo;
    }
    localStorage.setItem('wordslayer_stats', JSON.stringify(data));
  } catch(e) {}
}

// === Wrong Book (persistent error tracking) ===
function loadWrongBook() {
  try {
    return JSON.parse(localStorage.getItem('wordslayer_wrongbook') || '{}');
  } catch(e) { return {}; }
}

function saveWrongBook(book) {
  try {
    localStorage.setItem('wordslayer_wrongbook', JSON.stringify(book));
  } catch(e) {}
}

function addToWrongBook(en, zh) {
  const book = loadWrongBook();
  if (!book[en]) {
    book[en] = { zh, wrong: 0, correct: 0 };
  }
  book[en].wrong++;
  saveWrongBook(book);
}

function markCorrectInWrongBook(en) {
  const book = loadWrongBook();
  if (!book[en]) return;
  book[en].correct++;
  if (book[en].correct >= 2) {
    delete book[en]; // mastered!
  }
  saveWrongBook(book);
}

function getWrongBookWords() {
  const book = loadWrongBook();
  return Object.entries(book).map(([en, data]) => ({ en, zh: data.zh, wrong: data.wrong, correct: data.correct }));
}

function getWrongBookCount() {
  return Object.keys(loadWrongBook()).length;
}

function clearWrongBook() {
  saveWrongBook({});
}

function updateMenuStats() {
  try {
    const data = JSON.parse(localStorage.getItem('wordslayer_stats') || '{}');
    const key = `${state.difficulty}_${state.mode}`;
    document.getElementById('menu-best').textContent = (data[key]?.bestScore || 0);
    document.getElementById('menu-mastered').textContent = (data[key]?.totalCorrect || 0);
  } catch(e) {}
  // Update wrong book count
  const count = getWrongBookCount();
  document.getElementById('menu-wrong-count').textContent = count;
  const reviewCard = document.getElementById('review-card');
  if (reviewCard) {
    reviewCard.style.opacity = count === 0 ? '0.4' : '1';
    reviewCard.querySelector('.menu-card-desc').textContent = count > 0 ? `${count} 个待复习` : '暂无错题';
  }
}

// ==================== MENU INTERACTION ====================
document.querySelectorAll('#mode-cards .menu-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('#mode-cards .menu-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    state.mode = card.dataset.mode;
    // Hide difficulty when review mode is selected
    const diffSection = document.getElementById('diff-section');
    if (state.mode === 'review') {
      diffSection.style.display = 'none';
      document.getElementById('btn-start').textContent = '📝 开始复习';
    } else {
      diffSection.style.display = '';
      document.getElementById('btn-start').textContent = '⚔️ 开始战斗';
    }
    updateMenuStats();
  });
});

document.querySelectorAll('#diff-cards .menu-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('#diff-cards .menu-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    state.difficulty = card.dataset.diff;
    updateMenuStats();
  });
});

function clearWrongBookAndUpdate() {
  if (confirm('确定要清空所有错题吗？这个操作不能撤销。')) {
    clearWrongBook();
    updateMenuStats();
  }
}

// On load
updateMenuStats();

// Prevent double-tap zoom on game buttons
document.addEventListener('dblclick', e => {
  if (e.target.closest('.opt-btn, .btn-start, .btn-retry, .btn-home, .menu-card')) {
    e.preventDefault();
  }
}, { passive: false });

// Resume audio context + preload voices on first touch (iOS)
document.addEventListener('touchstart', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    // Speak a silent utterance to warm up the speech engine

    wu.volume = 0;
    window.speechSynthesis.speak(wu);
  }
}, { once: true });
